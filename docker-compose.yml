services:
  api:
    build: .
    command: node dist/server.js
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/wavecom-notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      LOG_LEVEL: info

    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: .
    command: node dist/workers/notificationWorker.js
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/wavecom-notifications
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: wavecom_rabbitmq
    ports:
      - "5673:5672" # Left as 5673 mapping on host, maps to 5672 internally
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo-data:
